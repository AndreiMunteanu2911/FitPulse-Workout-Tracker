<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>FitPulse</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b10;
        --panel: #10141c;
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f5f7fb;
        --muted: rgba(245, 247, 251, 0.68);
        --accent: #d3e25a;
        --accent-2: #8ca336;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(211, 226, 90, 0.14), transparent 34%),
          linear-gradient(180deg, #0d1017 0%, var(--bg) 58%, #05070a 100%);
        color: var(--text);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 30rem);
        padding: 2rem 1.5rem;
      }

      .card {
        background: rgba(16, 20, 28, 0.92);
        border: 1px solid var(--panel-border);
        border-radius: 1.5rem;
        padding: 1.5rem;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      .brand {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 0.9rem;
        margin-bottom: 1.25rem;
      }

      .brand img {
        width: 3.25rem;
        height: 3.25rem;
        object-fit: contain;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.04);
        padding: 0.35rem;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .status {
        margin-top: 1rem;
        font-size: 0.95rem;
      }

      .spinner {
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 999px;
        border: 3px solid rgba(211, 226, 90, 0.18);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
        margin: 1.5rem 0 1rem;
      }

      .actions {
        display: none;
        grid-template-columns: 1fr;
        gap: 0.75rem;
        margin-top: 1.25rem;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 999px;
        text-decoration: none;
        cursor: pointer;
        padding: 0.9rem 1rem;
        font-weight: 700;
        font-size: 0.95rem;
        text-align: center;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #11150f;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .footer {
        margin-top: 1rem;
        font-size: 0.82rem;
        color: rgba(245, 247, 251, 0.45);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <div class="brand">
          <img src="./logo.png" alt="FitPulse logo" />
          <div>
            <h1>FitPulse</h1>
            <p>Launching your workout tracker</p>
          </div>
        </div>

        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">
          Connecting to the live FitPulse app.
        </p>
        <div class="actions" id="actions">
          <button class="primary" id="retry">Retry</button>
          <a class="secondary" id="open-browser" target="_blank" rel="noreferrer">
            Open in browser
          </a>
        </div>
        <p class="footer">
          Your workouts, history, AI coach, and shop stay on the hosted app.
        </p>
      </section>
    </main>

    <script>
      (function () {
        var APP_HOST = "https://fitpulseam.vercel.app";
        var APP_SCHEME = "com.fitpulse.app";
        var statusEl = document.getElementById("status");
        var spinnerEl = document.getElementById("spinner");
        var actionsEl = document.getElementById("actions");
        var retryEl = document.getElementById("retry");
        var openBrowserEl = document.getElementById("open-browser");
        var targetPath = "/";

        openBrowserEl.href = APP_HOST;

        function setStatus(message) {
          statusEl.textContent = message;
        }

        function showFallback(message) {
          setStatus(message);
          spinnerEl.style.display = "none";
          actionsEl.style.display = "grid";
          if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
            window.Capacitor.Plugins.SplashScreen.hide().catch(function () {});
          }
          openBrowserEl.href = APP_HOST + targetPath;
        }

        function normalizeTarget(path) {
          if (!path) return "/";
          if (/^https?:\/\//i.test(path)) return path;
          return path.startsWith("/") ? path : "/" + path;
        }

        function parseAppUrl(url) {
          try {
            var parsed = new URL(url);
            if (parsed.protocol.indexOf(APP_SCHEME) !== 0) {
              return normalizeTarget(parsed.pathname + parsed.search + parsed.hash);
            }
            var host = parsed.host ? "/" + parsed.host : "";
            var path = parsed.pathname && parsed.pathname !== "/" ? parsed.pathname : "";
            return normalizeTarget(host + path + parsed.search + parsed.hash);
          } catch (error) {
            return "/";
          }
        }

        function pingHost() {
          return Promise.race([
            fetch(APP_HOST, {
              method: "GET",
              mode: "no-cors",
              cache: "no-store",
            }),
            new Promise(function (_, reject) {
              setTimeout(function () {
                reject(new Error("Timed out"));
              }, 7000);
            }),
          ]);
        }

        function redirectToHosted(path) {
          var normalized = normalizeTarget(path);
          window.location.replace(APP_HOST + normalized);
        }

        function connect(path) {
          targetPath = normalizeTarget(path);
          openBrowserEl.href = APP_HOST + targetPath;
          setStatus("Connecting to the live FitPulse app.");

          pingHost()
            .then(function () {
              redirectToHosted(targetPath);
            })
            .catch(function () {
              showFallback("FitPulse is offline or unreachable right now. Check your connection and retry.");
            });
        }

        retryEl.addEventListener("click", function () {
          actionsEl.style.display = "none";
          spinnerEl.style.display = "block";
          connect(targetPath);
        });

        window.addEventListener("online", function () {
          if (actionsEl.style.display === "grid") {
            retryEl.click();
          }
        });

        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
          window.Capacitor.Plugins.App.addListener("appUrlOpen", function (event) {
            connect(parseAppUrl(event.url));
          });
        }

        connect("/");
      })();
    </script>
  </body>
</html>
